<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratchpad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap');

  :root {
    --bg:      #1a1a1a;
    --surface: #222222;
    --border:  #333333;
    --text:    #e8e8e8;
    --muted:   #666666;
    --accent:  #7eb8f7;
    --danger:  #f07070;
    --success: #7ecf8e;
    --warning: #f0c070;
    --radius:  6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Noto Sans JP', sans-serif; font-size: 15px; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace; font-size: 15px;
    font-weight: 500; color: var(--accent); letter-spacing: 0.05em; flex-shrink: 0;
  }

  .spacer { flex: 1; }

  #status {
    font-size: 12px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; white-space: nowrap;
  }
  #status.saving  { color: var(--warning); }
  #status.saved   { color: var(--success); }
  #status.dirty   { color: var(--muted); }
  #status.error   { color: var(--danger); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); background: transparent;
    color: var(--text); font-size: 13px; font-family: inherit;
    cursor: pointer; transition: background 0.15s, border-color 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #111; font-weight: 500; }
  .btn-primary:hover { background: #a0ccff; border-color: #a0ccff; }
  .btn-icon { padding: 5px 8px; font-size: 16px; }

  #editor-wrap { flex: 1; display: flex; overflow: hidden; }

  #editor {
    flex: 1; background: var(--bg); color: var(--text);
    border: none; outline: none; resize: none;
    padding: 20px 24px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 15px;
    line-height: 1.75; caret-color: var(--accent);
  }
  #editor::placeholder { color: var(--muted); }

  #login-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px; padding: 40px;
  }
  .login-icon { font-size: 56px; opacity: 0.3; }
  .login-title { font-family: 'JetBrains Mono', monospace; font-size: 22px; color: var(--accent); letter-spacing: 0.08em; }
  .login-sub { color: var(--muted); font-size: 14px; text-align: center; line-height: 1.6; }
  #login-error { color: var(--danger); font-size: 13px; text-align: center; min-height: 20px; }

  #loading-screen {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 12px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    header { padding: 8px 12px; }
    #editor { padding: 14px 16px; font-size: 14px; }
    .logo { font-size: 14px; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <span class="logo">// scratchpad</span>
    <div class="spacer"></div>
    <span id="status" class="hidden"></span>
    <button class="btn btn-icon hidden" id="btn-reload" title="再読み込み">↺</button>
    <button class="btn btn-icon hidden" id="btn-save"   title="保存">⬆</button>
    <button class="btn hidden"          id="btn-logout">ログアウト</button>
    <button class="btn btn-primary hidden" id="btn-login">Dropboxでログイン</button>
  </header>

  <div id="loading-screen">
    <div class="spinner"></div>
    <span>読み込み中...</span>
  </div>

  <div id="login-screen" class="hidden">
    <div class="login-icon">📝</div>
    <div class="login-title">Scratchpad</div>
    <div class="login-sub">Dropboxにログインして<br>どこからでもメモにアクセス</div>
    <button class="btn btn-primary" id="btn-login-center">Dropboxでログイン</button>
    <div id="login-error"></div>
  </div>

  <div id="editor-wrap" class="hidden">
    <textarea id="editor" placeholder="ここに自由に書いてください..."></textarea>
  </div>

</div>

<script>
// ============================================================
//  設定
// ============================================================
const APP_KEY     = 'jbxq663njsk74tl';  // ← 書き換えてください
const WORKER_BASE = 'https://scratchpad-oauth.youm00.workers.dev';
const REDIRECT_URI = 'https://youm00.github.io/scratchpad/';
const FILE_PATH   = '/scratchpad.txt';
// ============================================================

const AUTO_SAVE_DELAY = 2000;

const store = {
  get: (k)    => localStorage.getItem(k),
  set: (k, v) => localStorage.setItem(k, v),
  del: (k)    => localStorage.removeItem(k),
};

let accessToken  = store.get('sp_access')  || '';
let refreshToken = store.get('sp_refresh') || '';
let tokenExpiry  = parseInt(store.get('sp_expiry') || '0');
let isDirty      = false;
let isSaving     = false;
let autoSaveTimer = null;

const $loading     = document.getElementById('loading-screen');
const $loginScreen = document.getElementById('login-screen');
const $editorWrap  = document.getElementById('editor-wrap');
const $editor      = document.getElementById('editor');
const $status      = document.getElementById('status');
const $btnLogin    = document.getElementById('btn-login');
const $btnLoginC   = document.getElementById('btn-login-center');
const $btnLogout   = document.getElementById('btn-logout');
const $btnSave     = document.getElementById('btn-save');
const $btnReload   = document.getElementById('btn-reload');
const $loginError  = document.getElementById('login-error');

function showLoading() {
  $loading.classList.remove('hidden');
  $loginScreen.classList.add('hidden');
  $editorWrap.classList.add('hidden');
  [$btnLogin, $btnLogout, $btnSave, $btnReload, $status].forEach(el => el.classList.add('hidden'));
}

function showLogin(errMsg = '') {
  $loading.classList.add('hidden');
  $loginScreen.classList.remove('hidden');
  $editorWrap.classList.add('hidden');
  $btnLogin.classList.remove('hidden');
  [$btnLogout, $btnSave, $btnReload, $status].forEach(el => el.classList.add('hidden'));
  $loginError.textContent = errMsg;
}

function showEditor() {
  $loading.classList.add('hidden');
  $loginScreen.classList.add('hidden');
  $editorWrap.classList.remove('hidden');
  [$btnLogout, $btnSave, $btnReload, $status].forEach(el => el.classList.remove('hidden'));
  $btnLogin.classList.add('hidden');
}

function setStatus(msg, type = '') {
  $status.textContent = msg;
  $status.className   = type;
  $status.classList.remove('hidden');
}

// ── PKCE helpers ─────────────────────────────────────────────
function base64url(buf) {
  return btoa(String.fromCharCode(...buf))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
async function sha256str(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return base64url(new Uint8Array(buf));
}
  
// ── OAuth2 ログイン（stateのみ、PKCEなし）────────────────────
async function signIn() {
  const verifier  = base64url(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = await sha256str(verifier);
  const state     = Math.random().toString(36).slice(2);
  sessionStorage.setItem('sp_oauth_state',    state);
  sessionStorage.setItem('sp_code_verifier',  verifier);

  const params = new URLSearchParams({
    client_id:             APP_KEY,
    response_type:         'code',
    redirect_uri:          REDIRECT_URI,
    token_access_type:     'offline',
    state,
    code_challenge:        challenge,
    code_challenge_method: 'S256',
  });

  location.href = 'https://www.dropbox.com/oauth2/authorize?' + params;
}

function saveTokens(data) {
  accessToken = data.access_token;
  if (data.refresh_token) {
    refreshToken = data.refresh_token;
    store.set('sp_refresh', refreshToken);
  }
  const expiry = Date.now() + (data.expires_in - 300) * 1000;
  tokenExpiry  = expiry;
  store.set('sp_access', accessToken);
  store.set('sp_expiry', String(expiry));
}

async function ensureValidToken() {
  if (!refreshToken) throw new Error('ログインが必要です');
  if (Date.now() > tokenExpiry) await refreshAccessToken();
}

async function refreshAccessToken() {
  const resp = await fetch(WORKER_BASE + '/token/refresh', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refreshToken }),
  });
  if (!resp.ok) throw new Error('トークン更新失敗');
  saveTokens(await resp.json());
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('sp_code_verifier') || '';
  sessionStorage.removeItem('sp_code_verifier');

  const resp = await fetch(WORKER_BASE + '/token/exchange', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, redirect_uri: REDIRECT_URI, code_verifier: verifier }),
  });
  const data = await resp.json();
  if (!resp.ok || !data.access_token) {
    throw new Error(data.error_description || data.error || JSON.stringify(data));
  }
  saveTokens(data);
}

async function loadText() {
  showLoading();
  try {
    await ensureValidToken();
    const resp = await fetch('https://content.dropboxapi.com/2/files/download', {
      method:  'POST',
      headers: {
        'Authorization':   'Bearer ' + accessToken,
        'Dropbox-API-Arg': JSON.stringify({ path: FILE_PATH }),
      },
    });

    if (resp.ok) {
      $editor.value = await resp.text();
    } else if (resp.status === 409) {
      $editor.value = '';
    } else {
      throw new Error('読み込みエラー ' + resp.status);
    }

    isDirty = false;
    setStatus('読み込み完了', 'saved');
    showEditor();
    setTimeout(() => setStatus('', ''), 2000);
  } catch (e) {
    if (e.message.includes('ログイン')) { showLogin(); return; }
    showEditor();
    setStatus('読み込みエラー: ' + e.message, 'error');
  }
}

async function saveText() {
  if (isSaving) return;
  isSaving = true;
  setStatus('保存中...', 'saving');
  $btnSave.disabled = true;

  try {
    await ensureValidToken();
    const resp = await fetch('https://content.dropboxapi.com/2/files/upload', {
      method:  'POST',
      headers: {
        'Authorization':   'Bearer ' + accessToken,
        'Content-Type':    'application/octet-stream',
        'Dropbox-API-Arg': JSON.stringify({
          path: FILE_PATH, mode: 'overwrite', autorename: false, mute: true,
        }),
      },
      body: new TextEncoder().encode($editor.value),
    });

    if (!resp.ok) throw new Error('保存エラー ' + resp.status);

    isDirty = false;
    const now = new Date();
    const hms = [now.getHours(), now.getMinutes(), now.getSeconds()]
      .map(n => String(n).padStart(2, '0')).join(':');
    setStatus('✓ 保存済み ' + hms, 'saved');
  } catch (e) {
    setStatus('保存エラー: ' + e.message, 'error');
  } finally {
    isSaving = false;
    $btnSave.disabled = false;
  }
}

function onEditorInput() {
  if (!isDirty) { isDirty = true; setStatus('未保存の変更あり', 'dirty'); }
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveText, AUTO_SAVE_DELAY);
}

function signOut() {
  if (!confirm('ログアウトしますか？')) return;
  accessToken = refreshToken = '';
  ['sp_access', 'sp_refresh', 'sp_expiry'].forEach(k => store.del(k));
  $editor.value = '';
  isDirty = false;
  showLogin();
}

$btnLogin.addEventListener('click',  signIn);
$btnLoginC.addEventListener('click', signIn);
$btnLogout.addEventListener('click', signOut);
$btnSave.addEventListener('click',   saveText);
$btnReload.addEventListener('click', loadText);
$editor.addEventListener('input',    onEditorInput);

window.addEventListener('beforeunload', e => {
  if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});

// ── 初期化（BulletMemo方式）─────────────────────────────────
window.addEventListener('load', async () => {
  const params = new URLSearchParams(location.search);
  const code   = params.get('code');
  const state  = params.get('state');

  // OAuthコールバック
  if (code && state && state === sessionStorage.getItem('sp_oauth_state')) {
    sessionStorage.removeItem('sp_oauth_state');
    history.replaceState({}, '', REDIRECT_URI);
    try {
      await exchangeCode(code);
      await loadText();
    } catch (e) {
      showLogin('ログインエラー: ' + e.message);
    }
    return;
  }

  // 既存トークンあり
  if (refreshToken) {
    try {
      await ensureValidToken();
      await loadText();
    } catch (e) {
      showLogin();
    }
    return;
  }

  // 未ログイン
  showLogin();
});
</script>
</body>
</html>
